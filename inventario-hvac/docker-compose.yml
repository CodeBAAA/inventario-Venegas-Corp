version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hvac_mysql
    restart: always
    environment:
      MYSQL_DATABASE: inventario_hvac
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: hvac_user
      MYSQL_PASSWORD: hvac_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
